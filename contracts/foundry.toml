[profile.default]
src = "src"
out = "out"
libs = ["lib"]
# Enable the optimizer so runtime bytecode stays under the EIP-170 24576-byte
# limit (the cross-chain voting modules and examples/cova contracts exceed it
# unoptimized) and to match how contracts are deployed on-chain.
optimizer = true
optimizer_runs = 200
# Allow deploy scripts to write the deployment address manifest.
fs_permissions = [{ access = "read-write", path = "./deployments" }]

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options

[fuzz]
runs = 1000
max_test_rejects = 100000

# CI profile (referenced via FOUNDRY_PROFILE=ci in .github/workflows/test.yml).
# Inherits all settings from the default profile.
[profile.ci]
