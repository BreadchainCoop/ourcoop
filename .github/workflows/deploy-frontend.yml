name: Deploy frontend (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "next.config.ts"
      - "postcss.config.mjs"
      - "tsconfig.json"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

# Allow one concurrent deployment; let in-progress runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22 # pnpm 11 (our packageManager) requires Node >= 22.13
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build static export
        run: pnpm build
        env:
          # Project Pages serves under /<repo>; drop this for a root custom domain.
          NEXT_PUBLIC_BASE_PATH: ${{ vars.NEXT_PUBLIC_BASE_PATH || '/crowdstake.fun' }}
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${{ vars.NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID }}
          NEXT_PUBLIC_RPC_URL: ${{ vars.NEXT_PUBLIC_RPC_URL }}
          NEXT_PUBLIC_RPC_URL_42161: ${{ vars.NEXT_PUBLIC_RPC_URL_42161 }}
          NEXT_PUBLIC_RPC_URL_10: ${{ vars.NEXT_PUBLIC_RPC_URL_10 }}
          NEXT_PUBLIC_RPC_URL_1: ${{ vars.NEXT_PUBLIC_RPC_URL_1 }}
          # Contract addresses are NOT baked in here anymore: the app fetches
          # the latest addresses.json from the rolling `contract-addresses`
          # GitHub release at runtime (published by contracts-deploy.yml), with
          # the chains.ts defaults (Gnosis + the l2-deployers.json addresses) as
          # offline fallback. A build-time NEXT_PUBLIC_DEPLOYER_* pin would take
          # precedence over the manifest (see ENV_PINNED in src/lib/chains.ts) —
          # only the e2e fork harness does that.
          # Optional override for where the manifest is fetched from
          # ("off" disables runtime hydration entirely).
          NEXT_PUBLIC_ADDRESSES_URL: ${{ vars.NEXT_PUBLIC_ADDRESSES_URL }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
