name: Deploy frontend (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "next.config.ts"
      - "postcss.config.mjs"
      - "tsconfig.json"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

# Allow one concurrent deployment; let in-progress runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22 # pnpm 11 (our packageManager) requires Node >= 22.13
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build static export
        run: pnpm build
        env:
          # Project Pages serves under /<repo>; drop this for a root custom domain.
          NEXT_PUBLIC_BASE_PATH: ${{ vars.NEXT_PUBLIC_BASE_PATH || '/crowdstake.fun' }}
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${{ vars.NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID }}
          NEXT_PUBLIC_RPC_URL: ${{ vars.NEXT_PUBLIC_RPC_URL }}
          # Instance deployer. Point NEXT_PUBLIC_DEPLOYER_ADDRESS at the V2
          # deployer and set NEXT_PUBLIC_DEPLOYER_V2=true to enable
          # democratic-instance creation in the deploy form.
          NEXT_PUBLIC_DEPLOYER_ADDRESS: ${{ vars.NEXT_PUBLIC_DEPLOYER_ADDRESS }}
          NEXT_PUBLIC_DEPLOYER_V2: ${{ vars.NEXT_PUBLIC_DEPLOYER_V2 }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
